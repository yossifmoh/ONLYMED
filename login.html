<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONLYMED - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
    .auth-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
    .auth-logo { color: var(--primary); font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 30px; }
    .auth-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #333; }
    .form-group { text-align: left; margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }
    .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
    .btn-auth { width: 100%; padding: 12px; background: #d0112b; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-auth:hover { background: #d0112b; }
    .auth-links { margin-top: 20px; font-size: 13px; }
    .auth-links a { color: var(--primary); text-decoration: none; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="auth-container" id="login-box">
    <div class="auth-logo">ONLYMED</div>
    <div class="auth-title">Welcome Back</div>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
    </div>
    
    <button class="btn-auth" onclick="doLogin()">Login</button>
    
    <div class="auth-links">
      <a onclick="toggleBox('forgot-box')">Forgot Password?</a> | 
      <a href="index.html">Back to Store</a>
    </div>
  </div>

  <div class="auth-container hidden" id="forgot-box">
    <div class="auth-logo">ONLYMED</div>
    <div class="auth-title">Reset Password</div>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">Enter your email and phone number to verify your identity.</p>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="fpEmail" class="form-control" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="fpPhone" class="form-control" placeholder="01xxxxxxxxx">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="fpNewPassword" class="form-control" placeholder="••••••••">
    </div>
    
    <button class="btn-auth" onclick="doResetPassword()">Reset Password</button>
    
    <div class="auth-links">
      <a onclick="toggleBox('login-box')">Back to Login</a>
    </div>
  </div>

  <div id="toast" class="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:5px; opacity:0; transition:0.3s;"></div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwv1vuPsTUNXz6BMvtxUwxSqnf9Tq1CX21KLMq0nL3aYFebslLVEe5V0i-VIHyJLhlr/exec";
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 3000);
    }

    function toggleBox(boxId) {
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('forgot-box').classList.add('hidden');
      document.getElementById(boxId).classList.remove('hidden');
    }

    async function hashStr(str) {
      const msgUint8 = new TextEncoder().encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      if(!email || !pass) return showToast('Please enter email and password');
      
      const btn = document.querySelector('#login-box .btn-auth');
      btn.innerText = 'Logging in...';
      
      const pwdHash = await hashStr(pass);
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type':'text/plain'},
          body: JSON.stringify({ action: 'login', email: email, passwordHash: pwdHash })
        });
        const data = await res.json();
        if(data.status === 'success') {
          localStorage.setItem('onlymed_user', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          showToast(data.message || 'Login failed');
          btn.innerText = 'Login';
        }
      } catch(e) {
        showToast('Network error');
        btn.innerText = 'Login';
      }
    }

    async function doResetPassword() {
      const email = document.getElementById('fpEmail').value;
      const phone = document.getElementById('fpPhone').value;
      const pass = document.getElementById('fpNewPassword').value;
      if(!email || !phone || !pass) return showToast('Please fill all fields');
      
      const btn = document.querySelector('#forgot-box .btn-auth');
      btn.innerText = 'Resetting...';
      
      const pwdHash = await hashStr(pass);
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type':'text/plain'},
          body: JSON.stringify({ action: 'resetPassword', email: email, phone: phone, newPasswordHash: pwdHash })
        });
        const data = await res.json();
        if(data.status === 'success') {
          showToast('Password reset successful! You can now login.');
          toggleBox('login-box');
        } else {
          showToast(data.message || 'Reset failed');
        }
        btn.innerText = 'Reset Password';
      } catch(e) {
        showToast('Network error');
        btn.innerText = 'Reset Password';
      }
    }
  </script>
</body>
</html>
