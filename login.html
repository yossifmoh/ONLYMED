<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Theme initializer: runs synchronously before any stylesheet parses to prevent FOUC -->
  <script>
    (function(){
      var t = localStorage.getItem('onlymed_theme');
      if (!t) {
        var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        t = systemDark ? 'dark' : 'light';
        localStorage.setItem('onlymed_theme', t);
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    html { background-color: #f9f9f9; }
    html[data-theme="dark"] { background-color: #050508; }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONLYMED - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: var(--bg-page, #f9f9f9); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; transition: background-color 0.25s; }
    .auth-container { background: var(--bg-card, white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border, #e5e7eb); }
    .auth-logo { color: #d0112b; font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 30px; }
    .auth-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text-main, #333); }
    .form-group { text-align: left; margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-muted, #666); }
    .form-control { width: 100%; padding: 12px; border: 1px solid var(--border, #ddd); border-radius: 8px; font-size: 14px; box-sizing: border-box; background: var(--bg-input, white); color: var(--text-main, #333); transition: border-color 0.2s, background-color 0.25s; }
    .form-control:focus { border-color: #d0112b; outline: none; }
    .btn-auth { width: 100%; padding: 12px; background: #d0112b; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    .btn-auth:hover { background: #b00d23; }
    .auth-links { margin-top: 20px; font-size: 13px; color: var(--text-muted, #666); }
    .auth-links a { color: #d0112b; text-decoration: none; cursor: pointer; }
    .hidden { display: none; }
    @media (max-width: 480px) {
      body { height: auto; min-height: 100vh; padding: 20px 0; box-sizing: border-box; align-items: flex-start; }
      .auth-container { padding: 24px 16px; margin: 16px; width: calc(100% - 32px); }
    }

    /* ── SMOOTH ROTATING LOADER ANIMATION ── */
    @keyframes fa-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .fa-spin {
      animation: fa-spin 1s infinite linear !important;
    }
  </style>
</head>
<body>

  <div class="auth-container animate-on-scroll slide-up" id="login-box">
    <div class="auth-logo">ONLYMED</div>
    <div class="auth-title">Welcome Back</div>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
    </div>
    
    <button class="btn-auth" onclick="doLogin()">Login</button>
    
    <div class="auth-links">
      <a onclick="toggleBox('forgot-box')">Forgot Password?</a> | 
      <a href="index.html">Back to Store</a>
    </div>
  </div>

  <div class="auth-container hidden animate-on-scroll slide-up" id="forgot-box">
    <div class="auth-logo">ONLYMED</div>
    <div class="auth-title">Reset Password</div>
    <p style="font-size:13px; color:#666; margin-bottom:20px;">Enter your email and phone number to verify your identity.</p>
    
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="fpEmail" class="form-control" placeholder="user@example.com">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="fpPhone" class="form-control" placeholder="01xxxxxxxxx">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="fpNewPassword" class="form-control" placeholder="••••••••">
    </div>
    
    <button class="btn-auth" onclick="doResetPassword()">Reset Password</button>
    
    <div class="auth-links">
      <a onclick="toggleBox('login-box')">Back to Login</a>
    </div>
  </div>

  <div id="toast" class="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:5px; opacity:0; transition:0.3s;"></div>

  <script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwv1vuPsTUNXz6BMvtxUwxSqnf9Tq1CX21KLMq0nL3aYFebslLVEe5V0i-VIHyJLhlr/exec";
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.opacity = '1';
      setTimeout(() => toast.style.opacity = '0', 3000);
    }

    function toggleBox(boxId) {
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('forgot-box').classList.add('hidden');
      const target = document.getElementById(boxId);
      if (target) {
        target.classList.remove('hidden');
        target.classList.add('is-visible');
      }
    }

    async function hashStr(str) {
      const msgUint8 = new TextEncoder().encode(str);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      if(!email || !pass) return showToast('Please enter email and password');
      
      const btn = document.querySelector('#login-box .btn-auth');
      let originalHtml = '';
      if (btn) {
        originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Logging in...';
        btn.disabled = true;
      }
      
      const pwdHash = await hashStr(pass);
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type':'text/plain'},
          body: JSON.stringify({ action: 'login', email: email, passwordHash: pwdHash })
        });
        const data = await res.json();
        if(data.status === 'success') {
          localStorage.setItem('onlymed_user', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          showToast(data.message || 'Login failed');
        }
      } catch(e) {
        showToast('Network error');
      } finally {
        if (btn) {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
        }
      }
    }

    async function doResetPassword() {
      const email = document.getElementById('fpEmail').value;
      const phone = document.getElementById('fpPhone').value;
      const pass = document.getElementById('fpNewPassword').value;
      if(!email || !phone || !pass) return showToast('Please fill all fields');
      
      const btn = document.querySelector('#forgot-box .btn-auth');
      let originalHtml = '';
      if (btn) {
        originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Resetting...';
        btn.disabled = true;
      }
      
      const pwdHash = await hashStr(pass);
      try {
        const res = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          headers: {'Content-Type':'text/plain'},
          body: JSON.stringify({ action: 'resetPassword', email: email, phone: phone, newPasswordHash: pwdHash })
        });
        const data = await res.json();
        if(data.status === 'success') {
          showToast('Password reset successful! You can now login.');
          toggleBox('login-box');
        } else {
          showToast(data.message || 'Reset failed');
        }
      } catch(e) {
        showToast('Network error');
      } finally {
        if (btn) {
          btn.innerHTML = originalHtml;
          btn.disabled = false;
        }
      }
    }
  </script>

  <script>
    
function showAuthBox() {
  const box = document.querySelector('.auth-container:not(.hidden)');
  if (box) box.classList.add('is-visible');
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', showAuthBox);
} else {
  showAuthBox();
}

  </script>
<script src="js/theme.js"></script>
</body>
</html>
